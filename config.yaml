# Semantic Search Engine Configuration

# Model Settings
model:
  name: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 32
  device: "cpu"  # 'cuda' or 'cpu'
  max_seq_length: 256

# FAISS Index Settings
faiss:
  index_type: "IndexFlatL2"
  metric: "cosine"  # 'cosine' or 'L2'
  nprobe: 5  # For IVF indices

# Search Settings
search:
  default_top_k: 10
  default_threshold: 0.5
  max_results: 100

# Data Paths
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  embeddings_file: "embeddings/document_embeddings.npy"
  index_file: "faiss_index/index.faiss"
  metadata_file: "data/processed/metadata.pkl"

# API Settings
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_enabled: true

# Web App Settings
web:
  port: 8501
  theme: "light"
  show_stats: true

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/semantic_search.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
