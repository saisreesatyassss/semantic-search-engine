version: '3.8'

services:
  # FastAPI Backend Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic-search-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./vector_database:/app/vector_database
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - semantic-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]  # Uncomment for GPU support

  # Streamlit Frontend Service
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic-search-ui
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./vector_database:/app/vector_database
    environment:
      - PYTHONPATH=/app
      - STREAMLIT_SERVER_PORT=8501
    command: python -m streamlit run web_app/app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - api
    networks:
      - semantic-network

networks:
  semantic-network:
    driver: bridge

volumes:
  data:
  models:
  vector_database:
  logs:
